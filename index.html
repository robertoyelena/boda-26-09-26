<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NOS CASAMOS</title>
  <link rel="icon" href="Sellodecera_ sombra.png" type="image/png" />
  <link rel="stylesheet" href="styles-index.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=The+Girl+Next+Door&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrap">

    <img id="sobre" src="Sellodecera_ sombra.png" alt="Sobre" />
    
  </div>

  <img src="titulo.png" alt="nos casamos" style="text-align: center; margin-top: -250px; display: block; margin-left: auto; margin-right: auto; max-width: 70%; height: auto;" class="letter-type" />

  <script>
    const img = document.getElementById("sobre");
    let animando = false;

    img.addEventListener("click", () => {
      if (animando) return;

      animando = true;
      document.body.style.backgroundColor = '#000';
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 1.5s ease-out';
      
      setTimeout(() => {
        window.location.href = "boda.html";
      }, 500);
    });
</script>
</body>
</html>
